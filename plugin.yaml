name: local_knowledge
version: 0.3.1
description: "Native Hermes tools for a configurable local capability index: search/get/neighbors plus local usage feedback/reporting."
author: Alex Stepanov
kind: standalone
provides_tools:
  - knowledge_search
  - knowledge_get
  - knowledge_neighbors
  - knowledge_feedback
  - knowledge_usage_report
provides_hooks:
  - post_tool_call
  - on_session_finalize
